<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 310" font-family="Arial, sans-serif" font-size="11">
  <rect x="0" y="0" width="780" height="310" fill="white"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Outer: Integration Partner App or Ad SDK -->
  <rect x="5" y="5" width="560" height="300" fill="#e0e0e0" stroke="#333" rx="4"/>
  <text x="285" y="20" text-anchor="middle" font-size="11" font-weight="bold">Integration Partner App or Ad SDK</text>

  <!-- Ad View or Video Player (gray, left side, outside WebView) -->
  <rect x="15" y="35" width="110" height="60" fill="#c0c0c0" stroke="#333" rx="3"/>
  <text x="70" y="62" text-anchor="middle" font-size="10">Ad View</text>
  <text x="70" y="75" text-anchor="middle" font-size="10">or Video Player</text>

  <!-- Partner WebView - green container -->
  <rect x="155" y="35" width="290" height="240" fill="#7fbf4f" stroke="#333" rx="3"/>
  <text x="300" y="52" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Partner WebView</text>

  <!-- Session Script label (not boxed, just text inside WebView) -->
  <text x="240" y="72" text-anchor="middle" font-size="10" fill="white">Session Script</text>

  <!-- Session Client (yellow, inside WebView) -->
  <rect x="175" y="80" width="180" height="35" fill="#ffff66" stroke="#333" rx="3"/>
  <text x="265" y="97" text-anchor="middle" font-size="10">Session Client</text>
  <text x="265" y="109" text-anchor="middle" font-size="9">(JavaScript API)</text>

  <!-- Arrow: Session Client -> JS Service (JS Signals) -->
  <line x1="265" y1="115" x2="265" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="140" font-size="8" fill="#333">JS Signals</text>

  <!-- Native Signals arrow from left side down to OM SDK Native -->
  <line x1="70" y1="95" x2="70" y2="195" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="48" y="145" font-size="8" fill="#333">Native</text>
  <text x="48" y="154" font-size="8" fill="#333">Signals</text>

  <!-- OM SDK (Native API) - blue -->
  <rect x="15" y="197" width="110" height="55" fill="#4472c4" stroke="#333" rx="3"/>
  <text x="70" y="220" text-anchor="middle" fill="white" font-size="10">OM SDK</text>
  <text x="70" y="233" text-anchor="middle" fill="white" font-size="10">(Native API)</text>

  <!-- Native Controller label at bottom-left -->
  <text x="70" y="270" text-anchor="middle" font-size="10" fill="#333">Native Controller</text>

  <!-- OM SDK JS Service - green inside WebView -->
  <rect x="175" y="160" width="130" height="45" fill="#339933" stroke="#333" rx="3"/>
  <text x="240" y="180" text-anchor="middle" fill="white" font-size="10">OM SDK</text>
  <text x="240" y="193" text-anchor="middle" fill="white" font-size="10">JS Service</text>

  <!-- Verification Script - orange inside WebView -->
  <rect x="340" y="155" width="90" height="55" fill="#ff9933" stroke="#333" rx="3"/>
  <text x="385" y="178" text-anchor="middle" font-size="9">Verification</text>
  <text x="385" y="190" text-anchor="middle" font-size="9">Script</text>

  <!-- Verification Client - orange inside WebView -->
  <rect x="340" y="220" width="90" height="35" fill="#ff9933" stroke="#333" rx="3"/>
  <text x="385" y="235" text-anchor="middle" font-size="9">Verification Client</text>
  <text x="385" y="247" text-anchor="middle" font-size="9">(JavaScript API)</text>

  <!-- OMID Bridge: Native API -> JS Service -->
  <line x1="125" y1="225" x2="173" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="195" font-size="8" fill="#333">OMID</text>
  <text x="140" y="218" font-size="8" fill="#333">Bridge</text>

  <!-- Arrow: JS Service -> Verification Script (OMID Events) -->
  <line x1="305" y1="182" x2="338" y2="182" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="321" y="175" text-anchor="middle" font-size="8" fill="#333">OMID</text>
  <text x="321" y="196" text-anchor="middle" font-size="8" fill="#333">Events</text>

  <!-- Legend -->
  <rect x="600" y="35" width="14" height="11" fill="#c0c0c0" stroke="#333"/>
  <text x="620" y="45" font-size="9">Integration Partner (Native)</text>
  <rect x="600" y="55" width="14" height="11" fill="#ffff66" stroke="#333"/>
  <text x="620" y="65" font-size="9">Integration Partner (JavaScript)</text>
  <rect x="600" y="75" width="14" height="11" fill="#4472c4" stroke="#333"/>
  <text x="620" y="85" font-size="9">OM SDK (Native)</text>
  <rect x="600" y="95" width="14" height="11" fill="#339933" stroke="#333"/>
  <text x="620" y="105" font-size="9">OM SDK (JavaScript)</text>
  <rect x="600" y="115" width="14" height="11" fill="#ff9933" stroke="#333"/>
  <text x="620" y="125" font-size="9">Third party (JavaScript)</text>
</svg>
