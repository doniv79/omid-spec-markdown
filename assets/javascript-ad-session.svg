<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 310" font-family="Arial, sans-serif" font-size="11">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Outer: Integration Partner App or Ad SDK -->
  <rect x="0" y="0" width="620" height="310" fill="#e0e0e0" stroke="#333" rx="4"/>
  <text x="310" y="16" text-anchor="middle" font-size="11" font-weight="bold">Integration Partner App or Ad SDK</text>

  <!-- Ad View or Video Player (native, not WebView) -->
  <rect x="10" y="30" width="130" height="55" fill="#c0c0c0" stroke="#333" rx="3"/>
  <text x="75" y="55" text-anchor="middle" font-size="10">Ad View</text>
  <text x="75" y="68" text-anchor="middle" font-size="10">or Video Player</text>

  <!-- OM SDK (Native API) - blue -->
  <rect x="10" y="160" width="130" height="60" fill="#4472c4" stroke="#333" rx="3"/>
  <text x="75" y="185" text-anchor="middle" fill="white" font-size="10">OM SDK</text>
  <text x="75" y="198" text-anchor="middle" fill="white" font-size="10">(Native API)</text>

  <!-- Native Controller label -->
  <text x="75" y="245" text-anchor="middle" font-size="10">Native Controller</text>

  <!-- Arrow: Ad View -> OM SDK (Native Signals) -->
  <line x1="75" y1="85" x2="75" y2="158" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="50" y="125" font-size="8" fill="#333">Native</text>
  <text x="50" y="134" font-size="8" fill="#333">Signals</text>

  <!-- Partner WebView - green container -->
  <rect x="170" y="30" width="280" height="260" fill="#7fbf4f" stroke="#333" rx="3"/>
  <text x="310" y="48" text-anchor="middle" fill="white" font-size="10">Partner WebView</text>

  <!-- Session Script / Session Client - yellow inside WebView -->
  <rect x="190" y="58" width="120" height="35" fill="#ffff66" stroke="#333" rx="3"/>
  <text x="250" y="72" text-anchor="middle" font-size="9">Session Script</text>
  <text x="250" y="84" text-anchor="middle" font-size="9">(JavaScript API)</text>

  <!-- Arrow: Session Client -> JS Service (JS Signals) -->
  <line x1="250" y1="93" x2="250" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="115" font-size="8" fill="#333">JS Signals</text>

  <!-- OM SDK JS Service - green -->
  <rect x="190" y="135" width="140" height="50" fill="#339933" stroke="#333" rx="3"/>
  <text x="260" y="158" text-anchor="middle" fill="white" font-size="10">OM SDK</text>
  <text x="260" y="171" text-anchor="middle" fill="white" font-size="10">JS Service</text>

  <!-- OMID Bridge: Native API <-> JS Service -->
  <line x1="140" y1="190" x2="188" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="155" y="170" font-size="8" fill="#333">OMID</text>
  <text x="155" y="179" font-size="8" fill="#333">Bridge</text>

  <!-- Verification Script - orange -->
  <rect x="360" y="120" width="80" height="55" fill="#ff9933" stroke="#333" rx="3"/>
  <text x="400" y="143" text-anchor="middle" font-size="9">Verification</text>
  <text x="400" y="155" text-anchor="middle" font-size="9">Script</text>

  <!-- Verification Client - orange -->
  <rect x="350" y="190" width="90" height="35" fill="#ff9933" stroke="#333" rx="3"/>
  <text x="395" y="205" text-anchor="middle" font-size="9">Verification Client</text>
  <text x="395" y="217" text-anchor="middle" font-size="9">(JavaScript API)</text>

  <!-- Arrow: JS Service -> Verification Script (OMID Events) -->
  <line x1="330" y1="160" x2="358" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="344" y="145" text-anchor="middle" font-size="8" fill="#333">OMID</text>
  <text x="344" y="168" text-anchor="middle" font-size="8" fill="#333">Events</text>

  <!-- Legend -->
  <rect x="640" y="30" width="14" height="11" fill="#c0c0c0" stroke="#333"/>
  <text x="660" y="40" font-size="9">Integration Partner (Native)</text>
  <rect x="640" y="50" width="14" height="11" fill="#ffff66" stroke="#333"/>
  <text x="660" y="60" font-size="9">Integration Partner (JavaScript)</text>
  <rect x="640" y="70" width="14" height="11" fill="#4472c4" stroke="#333"/>
  <text x="660" y="80" font-size="9">OM SDK (Native)</text>
  <rect x="640" y="90" width="14" height="11" fill="#339933" stroke="#333"/>
  <text x="660" y="100" font-size="9">OM SDK (JavaScript)</text>
  <rect x="640" y="110" width="14" height="11" fill="#ff9933" stroke="#333"/>
  <text x="660" y="120" font-size="9">Third party (JavaScript)</text>
</svg>
